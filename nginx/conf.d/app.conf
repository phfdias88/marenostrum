upstream mn_api  { server api:8000; keepalive 16; }
upstream mn_web  { server web:3000; keepalive 16; }

# HTTP — serve ACME challenge + redirect tudo o resto pra HTTPS.
server {
    listen 80;
    server_name srv1412083.hstgr.cloud 72.60.248.41 _;

    # Webroot pro certbot renew (HTTP-01 challenge)
    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
    }

    # Redirect tudo pro HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS 1.2/1.3, cert Let's Encrypt.
server {
    listen 443 ssl;
    http2 on;
    server_name srv1412083.hstgr.cloud 72.60.248.41 _;

    ssl_certificate     /etc/letsencrypt/live/srv1412083.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1412083.hstgr.cloud/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    location /api/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?)$ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
