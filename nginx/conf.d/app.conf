upstream mn_api  { server api:8000; keepalive 16; }
upstream mn_web  { server web:3000; keepalive 16; }

# Cache de borda pros dados do Censo (IBGE 2022 — estáticos). A 1ª visita de
# qualquer usuário aquece; as seguintes saem do disco em ~0,2s sem tocar a API.
# Chave inclui Accept-Encoding (brotli/gzip variam o corpo).
proxy_cache_path /var/cache/nginx/census levels=1:2 keys_zone=mn_census:10m
                 max_size=300m inactive=7d use_temp_path=off;

# Cache de borda pros dados TSE (históricos). Aqui o nginx HONRA o
# Cache-Control do backend (max-age=300 nos dados, 1-30d nas fotos) — nada de
# TTL forçado, então endpoints sem header público (ex: /sync) nunca entram.
proxy_cache_path /var/cache/nginx/tse levels=1:2 keys_zone=mn_tse:10m
                 max_size=500m inactive=24h use_temp_path=off;

# Sem token → pula o cache (vai pra API tomar 401). Evita servir dado cacheado
# pra requisição não autenticada.
map $http_authorization $census_skip_cache {
    ""      1;
    default 0;
}

# HTTP — serve ACME challenge + redirect tudo o resto pra HTTPS.
server {
    listen 80;
    server_name srv1412083.hstgr.cloud 72.60.248.41 _;

    # Webroot pro certbot renew (HTTP-01 challenge)
    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
    }

    # Redirect SEMPRE pro hostname canônico (não pro $host): quem digita o IP
    # 72.60.248.41 cai no endereço com certificado válido — sem aviso de
    # "conexão não é privada" (o cert só cobre o hostname, não o IP).
    location / {
        return 301 https://srv1412083.hstgr.cloud$request_uri;
    }
}

# Listener INTERNO de warmup (sem TLS, porta não publicada no compose — só a
# rede interna alcança). O warmup da api bate aqui pra popular o proxy_cache;
# a chave de cache ($uri+args+Accept-Encoding) é a mesma do server público,
# então as entradas valem pros usuários reais.
server {
    listen 8088;
    server_name _;

    location /api/v1/census/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;

        proxy_cache        mn_census;
        proxy_cache_key    "$uri$is_args$args$http_accept_encoding";
        proxy_cache_valid  200 7d;
        proxy_no_cache     $census_skip_cache;
        proxy_cache_bypass $census_skip_cache;
        proxy_cache_lock      on;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;
        add_header         X-Cache-Status $upstream_cache_status;
    }
}

# HTTPS via IP — o handshake TLS ainda mostra o aviso (cert não cobre IP; é
# limitação do Let's Encrypt), mas se o usuário prosseguir, redireciona pro
# hostname canônico em vez de deixá-lo navegando pelo IP (evita também a
# classe de problemas de CORS/cookies por origem divergente).
server {
    listen 443 ssl;
    http2 on;
    server_name 72.60.248.41;

    ssl_certificate     /etc/letsencrypt/live/srv1412083.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1412083.hstgr.cloud/privkey.pem;

    return 301 https://srv1412083.hstgr.cloud$request_uri;
}

# HTTPS — TLS 1.2/1.3, cert Let's Encrypt. (O IP fica no bloco de redirect
# acima — aqui só o hostname canônico + catch-all.)
server {
    listen 443 ssl;
    http2 on;
    server_name srv1412083.hstgr.cloud _;

    ssl_certificate     /etc/letsencrypt/live/srv1412083.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1412083.hstgr.cloud/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # Censo: igual ao /api/ + proxy_cache (dado estático do IBGE).
    location /api/v1/census/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_cache        mn_census;
        proxy_cache_key    "$uri$is_args$args$http_accept_encoding";
        proxy_cache_valid  200 7d;
        proxy_no_cache     $census_skip_cache;
        proxy_cache_bypass $census_skip_cache;
        # Anti-stampede: 1 só request aquece; demais esperam ou levam stale.
        proxy_cache_lock      on;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;
        add_header         X-Cache-Status $upstream_cache_status;
    }

    # TSE: cache de borda honrando o Cache-Control do backend (sem TTL
    # forçado). Dados públicos ficam 5 min; fotos 1-30 dias; /sync (no-store)
    # nunca entra. Favoritos/monitorados estão em /monitored — fora daqui.
    location /api/v1/tse/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        proxy_cache        mn_tse;
        proxy_cache_key    "$uri$is_args$args$http_accept_encoding";
        proxy_no_cache     $census_skip_cache;
        proxy_cache_bypass $census_skip_cache;
        proxy_cache_lock      on;
        # Entrada expirada (max-age=300) é servida NA HORA e re-buscada em
        # background — usuário nunca espera revalidação de dado histórico.
        proxy_cache_use_stale updating error timeout;
        proxy_cache_background_update on;
        add_header         X-Cache-Status $upstream_cache_status;
    }

    location /api/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?)$ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
