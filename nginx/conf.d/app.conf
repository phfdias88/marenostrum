upstream mn_api  { server api:8000; keepalive 16; }
upstream mn_web  { server web:3000; keepalive 16; }

server {
    listen 80;
    server_name _;

    # /api -> FastAPI
    location /api/ {
        proxy_pass         http://mn_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Assets do Next.js com hash no nome (immutable) — cache 1 ano
    location /_next/static/ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # Imagens/fontes estáticas (logos, bandeiras, ícones) — cache 30 dias.
    # Não casa com /api/.../photo (não termina em extensão de imagem).
    location ~* \.(png|jpe?g|gif|svg|ico|webp|avif|woff2?)$ {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_hide_header  Cache-Control;
        add_header         Cache-Control "public, max-age=2592000";
    }

    # / -> Next.js
    location / {
        proxy_pass         http://mn_web;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
